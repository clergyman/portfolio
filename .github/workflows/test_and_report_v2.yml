name: Test And Report V2

on:
  workflow_dispatch:

jobs:
  test-and-report:
    if: github.ref == 'refs/heads/full-allure-annotation'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .

      - name: Install Node dependencies
        run: npm ci

      - name: Run pytest
        run: pytest

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error
          retention-days: 14

  branch-guard:
    if: github.ref != 'refs/heads/full-allure-annotation'
    runs-on: ubuntu-latest

    steps:
      - name: Stop on unsupported branch
        run: |
          echo "This workflow can only be run from branch full-allure-annotation."
          exit 1
