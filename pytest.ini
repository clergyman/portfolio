[pytest]
addopts = -ra --strict-markers --alluredir allure-results --clean-alluredir
markers =
    contract: OpenAPI contract validation.
    api: Endpoint-level portfolio API tests.
    integration: Integration tests with service state assertions.
    e2e: End-to-end portfolio workflows.
    live: Optional live public sandbox tests that perform real HTTP calls.
    smoke: Small high-value smoke coverage.
    auth: Authorization and authentication behavior.
    valuation: Pricing and valuation behavior.
    slow: Longer-running checks, mostly end-to-end scenarios.
    performance: Timing and throughput-oriented checks.
    flaky: Intentionally unstable or random-failure checks.
