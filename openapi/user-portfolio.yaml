openapi: 3.0.3
info:
  title: User Portfolio Service API
  version: 1.0.0
  description: >
    Fictional portfolio microservice for a retail trading platform. The contract is
    intentionally realistic and is used by pytest contract tests.
servers:
  - url: https://portfolio-api.sandbox.allyre.example
tags:
  - name: Portfolios
  - name: Transfers
  - name: Orders
  - name: Valuation
  - name: Activities
paths:
  /portfolios:
    post:
      tags: [Portfolios]
      operationId: createPortfolio
      summary: Create a portfolio for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePortfolioRequest'
      responses:
        '201':
          description: Portfolio created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /portfolios/{portfolio_id}:
    get:
      tags: [Portfolios]
      operationId: getPortfolio
      summary: Get portfolio details
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
      responses:
        '200':
          description: Portfolio details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /portfolios/{portfolio_id}/cash-transfers:
    post:
      tags: [Transfers]
      operationId: createCashTransfer
      summary: Deposit or withdraw cash from a portfolio
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashTransferRequest'
      responses:
        '202':
          description: Transfer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashTransfer'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /portfolios/{portfolio_id}/orders:
    post:
      tags: [Orders]
      operationId: submitOrder
      summary: Submit a portfolio order
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '202':
          description: Order accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /portfolios/{portfolio_id}/positions:
    get:
      tags: [Portfolios]
      operationId: listPositions
      summary: List current positions
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
      responses:
        '200':
          description: Position list
          content:
            application/json:
              schema:
                type: object
                required: [portfolio_id, items]
                properties:
                  portfolio_id:
                    type: string
                    format: uuid
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Position'
  /portfolios/{portfolio_id}/valuation:
    get:
      tags: [Valuation]
      operationId: getValuation
      summary: Get latest valuation
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
      responses:
        '200':
          description: Portfolio valuation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Valuation'
        '424':
          description: Pricing dependency unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /portfolios/{portfolio_id}/rebalance:
    post:
      tags: [Orders]
      operationId: rebalancePortfolio
      summary: Rebalance portfolio to target allocation
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RebalanceRequest'
      responses:
        '202':
          description: Rebalance plan accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebalancePlan'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /portfolios/{portfolio_id}/activities:
    get:
      tags: [Activities]
      operationId: listActivities
      summary: Get activity timeline
      parameters:
        - $ref: '#/components/parameters/PortfolioId'
      responses:
        '200':
          description: Activity list
          content:
            application/json:
              schema:
                type: object
                required: [portfolio_id, items]
                properties:
                  portfolio_id:
                    type: string
                    format: uuid
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
components:
  parameters:
    PortfolioId:
      name: portfolio_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 64
  responses:
    ValidationError:
      description: Validation failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Operation is not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    CreatePortfolioRequest:
      type: object
      additionalProperties: false
      required: [user_id, base_currency, investment_strategy, risk_profile]
      properties:
        user_id:
          type: string
          format: uuid
        base_currency:
          type: string
          enum: [USD, EUR, GBP]
        investment_strategy:
          type: string
          enum: [BALANCED, GROWTH, INCOME]
        risk_profile:
          type: string
          enum: [CONSERVATIVE, MODERATE, AGGRESSIVE]
        external_reference:
          type: string
          maxLength: 64
    Portfolio:
      type: object
      additionalProperties: false
      required:
        - portfolio_id
        - user_id
        - status
        - base_currency
        - investment_strategy
        - risk_profile
        - created_at
        - cash_balance
      properties:
        portfolio_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, CLOSED]
        base_currency:
          type: string
          enum: [USD, EUR, GBP]
        investment_strategy:
          type: string
          enum: [BALANCED, GROWTH, INCOME]
        risk_profile:
          type: string
          enum: [CONSERVATIVE, MODERATE, AGGRESSIVE]
        created_at:
          type: string
          format: date-time
        cash_balance:
          $ref: '#/components/schemas/CashBalance'
    CashBalance:
      type: object
      additionalProperties: false
      required: [currency, available, settled, pending]
      properties:
        currency:
          type: string
        available:
          type: number
        settled:
          type: number
        pending:
          type: number
    CashTransferRequest:
      type: object
      additionalProperties: false
      required: [direction, currency, amount]
      properties:
        direction:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        currency:
          type: string
          enum: [USD, EUR, GBP]
        amount:
          type: number
          exclusiveMinimum: 0
    CashTransfer:
      type: object
      additionalProperties: false
      required: [transfer_id, portfolio_id, direction, currency, amount, status, requested_at]
      properties:
        transfer_id:
          type: string
          format: uuid
        portfolio_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        currency:
          type: string
          enum: [USD, EUR, GBP]
        amount:
          type: number
        status:
          type: string
          enum: [PENDING, SETTLED, REJECTED]
        requested_at:
          type: string
          format: date-time
    OrderRequest:
      type: object
      additionalProperties: false
      required: [instrument_id, side, quantity, order_type]
      properties:
        instrument_id:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: number
          exclusiveMinimum: 0
        order_type:
          type: string
          enum: [MARKET, LIMIT]
        limit_price:
          type: number
    Order:
      type: object
      additionalProperties: false
      required:
        - order_id
        - portfolio_id
        - instrument_id
        - side
        - quantity
        - order_type
        - status
        - submitted_at
      properties:
        order_id:
          type: string
          format: uuid
        portfolio_id:
          type: string
          format: uuid
        instrument_id:
          type: string
        side:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: number
        order_type:
          type: string
          enum: [MARKET, LIMIT]
        status:
          type: string
          enum: [PENDING_EXECUTION, PARTIALLY_FILLED, FILLED, REJECTED]
        submitted_at:
          type: string
          format: date-time
    Position:
      type: object
      additionalProperties: false
      required: [instrument_id, symbol, asset_class, quantity, average_cost, market_value]
      properties:
        instrument_id:
          type: string
        symbol:
          type: string
        asset_class:
          type: string
          enum: [EQUITY, ETF, BOND, CASH]
        quantity:
          type: number
        average_cost:
          type: number
        market_value:
          type: number
    Valuation:
      type: object
      additionalProperties: false
      required:
        - portfolio_id
        - currency
        - nav
        - cash_total
        - positions_total
        - unrealized_pnl
        - valued_at
      properties:
        portfolio_id:
          type: string
          format: uuid
        currency:
          type: string
          enum: [USD, EUR, GBP]
        nav:
          type: number
        cash_total:
          type: number
        positions_total:
          type: number
        unrealized_pnl:
          type: number
        valued_at:
          type: string
          format: date-time
    RebalanceRequest:
      type: object
      additionalProperties: false
      required: [targets]
      properties:
        targets:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [instrument_id, target_weight]
            properties:
              instrument_id:
                type: string
              target_weight:
                type: number
                exclusiveMinimum: 0
                maximum: 1
        tolerance:
          type: number
          minimum: 0
          maximum: 0.1
    RebalancePlan:
      type: object
      additionalProperties: false
      required: [portfolio_id, status, generated_orders]
      properties:
        portfolio_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PLANNED, NO_ACTION, REJECTED]
        generated_orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
    Activity:
      type: object
      additionalProperties: false
      required: [activity_id, type, occurred_at, actor]
      properties:
        activity_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [PORTFOLIO_CREATED, CASH_TRANSFER, ORDER_SUBMITTED, ORDER_FILLED, REBALANCE_REQUESTED]
        occurred_at:
          type: string
          format: date-time
        actor:
          type: string
        metadata:
          type: object
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
